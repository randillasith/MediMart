<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>MediMart - Medicine CRUD Test</title>
    <style>
        body{font-family:Arial;margin:20px;}
        input, select{padding:6px;margin:4px;}
        button{padding:6px 10px;margin:4px;cursor:pointer;}
        table{border-collapse:collapse;width:100%;margin-top:12px;}
        th,td{border:1px solid #ccc;padding:8px;text-align:left;}
    </style>
</head>
<body>
<h2>Medicine CRUD (Test UI)</h2>

<section>
    <h3>1) Categories</h3>
    <input id="catName" placeholder="Category name e.g. Pain Relief">
    <button onclick="createCategory()">Add Category</button>
    <button onclick="loadCategories()">Refresh Categories</button>
    <select id="categorySelect"></select>
</section>

<hr>

<section>
    <h3>2) Add / Update Medicine</h3>
    <input id="medId" placeholder="ID (only for update)">
    <input id="sku" placeholder="SKU (MED001)">
    <input id="name" placeholder="Name (Panadol)">
    <input id="brand" placeholder="Brand">
    <input id="dosage" placeholder="Dosage (500mg)">
    <input id="price" placeholder="Price (50.00)">
    <input id="stockQty" placeholder="Stock (100)">
    <input id="expiryDate" placeholder="Expiry (YYYY-MM-DD)">
    <select id="prescriptionRequired">
        <option value="false">OTC (No Prescription)</option>
        <option value="true">Prescription Required</option>
    </select>
    <select id="status">
        <option>AVAILABLE</option>
        <option>OUT_OF_STOCK</option>
        <option>DISCONTINUED</option>
    </select>
    <br>
    <button onclick="createMedicine()">Create</button>
    <button onclick="updateMedicine()">Update</button>
    <button onclick="loadMedicines()">Refresh List</button>
</section>

<section>
    <h3>3) Medicine List</h3>
    <table>
        <thead>
        <tr>
            <th>ID</th><th>SKU</th><th>Name</th><th>Brand</th><th>Price</th>
            <th>Stock</th><th>Status</th><th>Category</th><th>Actions</th>
        </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</section>

<script>
    async function loadCategories(){
        const res = await fetch('/api/categories');
        const data = await res.json();
        const sel = document.getElementById('categorySelect');
        sel.innerHTML = '';
        data.forEach(c=>{
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.id} - ${c.name}`;
            sel.appendChild(opt);
        });
    }

    async function createCategory(){
        const name = document.getElementById('catName').value.trim();
        if(!name) return alert('Category name required');
        await fetch('/api/categories', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({name})
        });
        document.getElementById('catName').value = '';
        await loadCategories();
    }

    function readMedForm(){
        return {
            sku: document.getElementById('sku').value.trim(),
            name: document.getElementById('name').value.trim(),
            brand: document.getElementById('brand').value.trim(),
            dosage: document.getElementById('dosage').value.trim(),
            price: document.getElementById('price').value,
            stockQty: parseInt(document.getElementById('stockQty').value || '0', 10),
            expiryDate: document.getElementById('expiryDate').value || null,
            prescriptionRequired: document.getElementById('prescriptionRequired').value === 'true',
            status: document.getElementById('status').value
        };
    }

    async function createMedicine(){
        const categoryId = document.getElementById('categorySelect').value;
        const m = readMedForm();
        if(!m.sku || !m.name) return alert('SKU and Name required');
        await fetch(`/api/medicines?categoryId=${categoryId}`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(m)
        });
        await loadMedicines();
    }

    async function updateMedicine(){
        const id = document.getElementById('medId').value.trim();
        if(!id) return alert('Put ID for update');
        const categoryId = document.getElementById('categorySelect').value;
        const m = readMedForm();
        await fetch(`/api/medicines/${id}?categoryId=${categoryId}`, {
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(m)
        });
        await loadMedicines();
    }

    async function deleteMedicine(id){
        await fetch(`/api/medicines/${id}`, { method:'DELETE' });
        await loadMedicines();
    }

    async function loadMedicines(){
        const res = await fetch('/api/medicines');
        const data = await res.json();
        const tbody = document.getElementById('rows');
        tbody.innerHTML = '';
        data.forEach(m=>{
            const tr = document.createElement('tr');
            tr.innerHTML = `
        <td>${m.id}</td>
        <td>${m.sku}</td>
        <td>${m.name}</td>
        <td>${m.brand ?? ''}</td>
        <td>${m.price}</td>
        <td>${m.stockQty}</td>
        <td>${m.status}</td>
        <td>${m.category?.name ?? ''}</td>
        <td><button onclick="deleteMedicine(${m.id})">Delete</button></td>
      `;
            tbody.appendChild(tr);
        });
    }

    // init
    loadCategories().then(loadMedicines);
</script>
</body>
</html>
